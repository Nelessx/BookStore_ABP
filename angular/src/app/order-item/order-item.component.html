<div class="card">
  <div class="card-header">
    <div class="row">
      <div class="col col-md-6">
        <h5 class="card-title">
          {{ '::Menu:OrderItems' | abpLocalization }}
        </h5>
      </div>
      <div class="text-end col col-md-6">
        <div class="text-lg-end pt-2">
          <button
            *abpPermission="'BookStore.OrderItems.Create'"
            class="btn btn-primary"
            type="button"
            (click)="createOrderItem()"
          >
            <i class="fa fa-plus me-1"></i>
            <span>New Order Item</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="card-body">
    <ngx-datatable
      class="ngx-datatable"
      [rows]="orderItem.items"
      [count]="orderItem.totalCount"
      [columnMode]="'force'"
      [headerHeight]="50"
      [footerHeight]="50"
      [rowHeight]="'auto'"
      [externalPaging]="true"
      [externalSorting]="true"
    >
      <ngx-datatable-column [name]="'Actions'" [width]="120" [sortable]="false">
        <ng-template let-row="row" ngx-datatable-cell-template>
          <div ngbDropdown container="body" class="d-inline-block">
            <button
              class="btn btn-primary btn-sm dropdown-toggle"
              ngbDropdownToggle
            >
              <i class="fa fa-cog me-1"></i>Actions
            </button>
            <div ngbDropdownMenu>
              <button
                *abpPermission="'BookStore.OrderItems.Edit'"
                ngbDropdownItem
                (click)="editOrderItem(row.id)"
              >
                Edit
              </button>

              <button
                *abpPermission="'BookStore.OrderItems.Delete'"
                ngbDropdownItem
                (click)="delete(row.id)"
              >
                Delete
              </button>
            </div>
          </div>
        </ng-template>
      </ngx-datatable-column>

      <ngx-datatable-column [name]="'Order Id'" prop="orderId">
      </ngx-datatable-column>

      <ngx-datatable-column [name]="'Book Id'" prop="bookId">
      </ngx-datatable-column>

      <ngx-datatable-column [name]="'Quantity'" prop="quantity">
      </ngx-datatable-column>

      <ngx-datatable-column [name]="'Price'" prop="price">
      </ngx-datatable-column>
    </ngx-datatable>
  </div>
</div>

<ng-template #createModal let-modal>
  <div class="modal-header">
    <h4 class="modal-title">
      {{ selectedOrderItem.id ? 'Edit Order Item' : 'New Order Item' }}
    </h4>
    <button type="button" class="btn-close" aria-label="Close" (click)="modal.dismiss()"></button>
  </div>

  <div class="modal-body">
    <form [formGroup]="form" (ngSubmit)="save()">

      <div class="form-group">
        <label for="order-id">Order Id</label><span> * </span>
        <input
          id="order-id"
          class="form-control"
          formControlName="orderId"
        />
      </div>

      <div class="mt-2">
        <label for="book-id">Book Id</label><span> * </span>
        <input
          id="book-id"
          class="form-control"
          formControlName="bookId"
        />
      </div>

      <div class="mt-2">
        <label for="quantity">Quantity</label><span> * </span>
        <input
          type="number"
          id="quantity"
          class="form-control"
          formControlName="quantity"
        />
      </div>

      <div class="mt-2">
        <label for="price">Price</label><span> * </span>
        <input
          type="number"
          id="price"
          class="form-control"
          formControlName="price"
        />
      </div>

    </form>
  </div>

  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" (click)="modal.close()">
      Close
    </button>

    <button class="btn btn-primary" (click)="save()" [disabled]="form.invalid">
      <i class="fa fa-check me-1"></i>
      Save
    </button>
  </div>
</ng-template>
