<div class="card">
  <div class="card-header">
    <div class="row">
      <div class="col col-md-6">
        <h5 class="card-title">
          Orders
        </h5>
      </div>
      <div class="text-end col col-md-6">
        <div class="text-lg-end pt-2">
          <button
            *abpPermission="'BookStore.Orders.Create'"
            class="btn btn-primary"
            type="button"
            (click)="createOrder()"
          >
            <i class="fa fa-plus me-1"></i>
            <span>New Order</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="card-body">
    <ngx-datatable
      class="ngx-datatable"
      [rows]="order.items"
      [count]="order.totalCount"
      [columnMode]="'force'"
      [headerHeight]="50"
      [footerHeight]="50"
      [rowHeight]="'auto'"
      [externalPaging]="true"
      [externalSorting]="true"
    >
      <ngx-datatable-column [name]="'Actions'" [width]="120" [sortable]="false">
        <ng-template let-row="row" ngx-datatable-cell-template>
          <div ngbDropdown container="body" class="d-inline-block">
            <button
              class="btn btn-primary btn-sm dropdown-toggle"
              ngbDropdownToggle
            >
              <i class="fa fa-cog me-1"></i>Actions
            </button>
            <div ngbDropdownMenu>
              <button
                *abpPermission="'BookStore.Orders.Edit'"
                ngbDropdownItem
                (click)="editOrder(row.id)"
              >
                Edit
              </button>

              <button
                *abpPermission="'BookStore.Orders.Delete'"
                ngbDropdownItem
                (click)="delete(row.id)"
              >
                Delete
              </button>
            </div>
          </div>
        </ng-template>
      </ngx-datatable-column>

      <ngx-datatable-column [name]="'Customer Id'" prop="customerId">
      </ngx-datatable-column>

      <ngx-datatable-column [name]="'Order Date'" prop="orderDate">
        <ng-template let-row="row" ngx-datatable-cell-template>
          {{ row.orderDate | date }}
        </ng-template>
      </ngx-datatable-column>

      <ngx-datatable-column [name]="'Total Amount'" prop="totalAmount">
      </ngx-datatable-column>
    </ngx-datatable>
  </div>
</div>

<ng-template #createModal let-modal>
  <div class="modal-header">
    <h4 class="modal-title">
      {{ selectedOrder.id ? 'Edit Order' : 'New Order' }}
    </h4>
    <button type="button" class="btn-close" aria-label="Close" (click)="modal.dismiss()"></button>
  </div>

  <div class="modal-body">
    <form [formGroup]="form" (ngSubmit)="save()">

      <div class="form-group">
        <label for="customer-id">Customer Id</label><span> * </span>
        <input
          id="customer-id"
          class="form-control"
          formControlName="customerId"
        />
      </div>

      <div class="mt-2">
        <label>Order Date</label><span> * </span>
        <input
          #datepicker="ngbDatepicker"
          class="form-control"
          name="datepicker"
          formControlName="orderDate"
          ngbDatepicker
          (click)="datepicker.toggle()"
        />
      </div>

      <div class="mt-2">
        <label for="total-amount">Total Amount</label><span> * </span>
        <input
          type="number"
          id="total-amount"
          class="form-control"
          formControlName="totalAmount"
        />
      </div>

    </form>
  </div>

  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" (click)="modal.close()">
      Close
    </button>

    <button class="btn btn-primary" (click)="save()" [disabled]="form.invalid">
      <i class="fa fa-check me-1"></i>
      Save
    </button>
  </div>
</ng-template>
